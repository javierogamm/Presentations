<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Centro de Presentaciones</title>
  <link rel="stylesheet" href="recursos/app.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <img src="recursos/brand-wave.svg" alt="Decoración" class="hero__bg" />
      <h1>Centro de Presentaciones</h1>
      <p>Selecciona una presentación para abrirla en una nueva pestaña.</p>
    </header>

    <section>
      <h2>Presentaciones disponibles</h2>
      <div id="presentations" class="grid" aria-live="polite"></div>
    </section>
    <section class="importer" aria-label="Importar PresentaJSON">
      <h2>Importar PresentaJSON</h2>
      <p>Carga un archivo exportado para abrir su presentación de origen.</p>
      <div class="importer__actions">
        <label class="btn btn--ghost" for="importPresentaJsonInput">Importar JSON</label>
        <input id="importPresentaJsonInput" type="file" accept="application/json,.json" hidden />
        <small id="importStatus" aria-live="polite"></small>
      </div>
    </section>
    <footer class="app__footer"><small id="appVersion"></small></footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
