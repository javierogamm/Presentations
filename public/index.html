<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Presentation HTML Editor</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      main {
        max-width: 640px;
        padding: 2rem;
        text-align: center;
      }
      a {
        display: inline-block;
        margin-top: 1rem;
        color: #0f172a;
        background: #38bdf8;
        text-decoration: none;
        padding: 0.75rem 1.25rem;
        border-radius: 0.5rem;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Editor de Presentaciones HTML</h1>
      <p>
        Edita archivos HTML, CSS y JS desde el navegador, visualiza cambios al
        instante y guarda directamente en GitHub para desplegar automáticamente
        en Vercel.
      </p>
      <a href="/public/editor.html">Abrir Editor</a>
    </main>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
