<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editor de Presentaciones</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #0f1115; color: #fff; height: 100vh; overflow: hidden; }
      .layout { display: grid; grid-template-columns: 280px 1fr 42%; height: 100vh; }
      .panel { border-right: 1px solid #262b34; }
      .sidebar { padding: 12px; overflow: auto; }
      .toolbar { display: flex; gap: 8px; margin-bottom: 12px; }
      button { border: 0; border-radius: 8px; padding: 10px 12px; font-weight: 600; cursor: pointer; }
      #saveBtn { background: #4cc38a; color: #05120c; }
      #refreshBtn { background: #2f3948; color: #d4dde8; }
      #status { font-size: 12px; color: #aeb7c4; margin: 8px 0; min-height: 16px; }
      ul { list-style: none; margin: 0; padding: 0; }
      .file-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 14px; word-break: break-word; }
      .file-item:hover { background: #1d2330; }
      .file-item.active { background: #2e3f69; }
      #editorContainer { width: 100%; height: 100%; }
      .preview { height: 100%; background: #111; display: flex; flex-direction: column; }
      .preview-head { padding: 10px; border-bottom: 1px solid #262b34; font-size: 13px; color: #b6c1d4; }
      #previewFrame { border: 0; width: 100%; flex: 1; background: #fff; }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="panel sidebar">
        <div class="toolbar">
          <button id="refreshBtn">Recargar</button>
          <button id="saveBtn">Guardar</button>
        </div>
        <div id="status"></div>
        <ul id="filesList"></ul>
      </aside>
      <section class="panel"><div id="editorContainer"></div></section>
      <section class="preview">
        <div class="preview-head">Vista previa en vivo</div>
        <iframe id="previewFrame" title="Preview"></iframe>
      </section>
    </div>

    <script src="https://unpkg.com/monaco-editor@0.52.2/min/vs/loader.js"></script>
    <script type="module" src="/js/editor.js"></script>
  </body>
</html>
